name: AvantGarde

options:
  bundleIdPrefix: com.avantgarde
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  defaultConfig: Debug
  groupSortPosition: none
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "2"
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:

  AvantGarde:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: src
        excludes:
          - "**/*.md"
    resources:
      - path: Resources/Assets.xcassets
      - path: Resources/Info.plist
        buildPhase: none
      - path: Resources/PrivacyInfo.xcprivacy
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Avant Garde
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        NSHumanReadableCopyright: "© 2026 Avant Garde"
        ITSAppUsesNonExemptEncryption: false
        LSMinimumSystemVersion: "13.0"
    entitlements:
      path: Resources/AvantGarde.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avantgarde.authoring
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/AvantGarde.entitlements
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          VALIDATE_PRODUCT: YES

  AvantGardeTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Tests
    dependencies:
      - target: AvantGarde
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avantgarde.authoring.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AvantGarde:
    build:
      targets:
        AvantGarde: all
        AvantGardeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: AvantGardeTests
          parallelizable: true
          randomExecutionOrder: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
